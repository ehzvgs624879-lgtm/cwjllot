<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWJ 赛博朋克运营中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 赛博朋克深色背景与呼吸灯动画 */
        body {
            background-color: #0a0a0a;
            background-image: radial-gradient(circle at center, #1a1a2e 0%, #000000 100%);
            color: #e0e0e0;
        }
        .neon-box {
            border: 1px solid #0ff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5), inset 0 0 10px rgba(0, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        .neon-box:active {
            transform: scale(0.98);
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.8), inset 0 0 15px rgba(255, 0, 255, 0.5);
            border-color: #f0f;
        }
        .neon-text {
            color: #0ff;
            text-shadow: 0 0 5px #0ff, 0 0 15px #0ff;
        }
        .neon-btn {
            background: transparent;
            border: 1px solid #f0f;
            color: #f0f;
            text-shadow: 0 0 5px #f0f;
            box-shadow: 0 0 5px rgba(255, 0, 255, 0.5);
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 font-mono">

    <!-- 头部标题 -->
    <header class="text-center mb-10 mt-4">
        <h1 class="text-3xl md:text-5xl font-bold neon-text mb-2">CWJ TOOLS</h1>
        <p class="text-sm md:text-base text-gray-400">赛博朋克运营中心 · 核心控制台</p>
    </header>

    <!-- 工具卡片网格 -->
    <main class="max-w-4xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- 工具 1：密码生成器 -->
        <div class="neon-box bg-gray-900 bg-opacity-80 p-6 rounded-lg">
            <h2 class="text-xl font-bold mb-4 text-cyan-400"># 密钥生成协议</h2>
            <p class="text-xs text-gray-500 mb-4">生成高强度随机安全密码。</p>
            <div class="flex flex-col gap-3">
                <input type="text" id="passwordOutput" readonly class="w-full bg-black border border-gray-700 rounded p-2 text-green-400 text-center" placeholder="点击下方生成">
                <div class="flex gap-2">
                    <button onclick="generatePassword()" class="neon-btn flex-1 py-2 rounded text-sm font-bold">立即生成</button>
                    <button onclick="copyToClipboard('passwordOutput')" class="border border-cyan-500 text-cyan-500 flex-1 py-2 rounded text-sm font-bold active:bg-cyan-900">一键复制</button>
                </div>
            </div>
        </div>

        <!-- 工具 2：设备与网络侦测 -->
        <div class="neon-box bg-gray-900 bg-opacity-80 p-6 rounded-lg">
            <h2 class="text-xl font-bold mb-4 text-cyan-400"># 终端网络侦测</h2>
            <p class="text-xs text-gray-500 mb-4">实时获取当前设备的 IP 节点信息。</p>
            <div class="bg-black border border-gray-700 rounded p-3 mb-3 min-h-[60px] text-sm text-green-400 break-all" id="ipOutput">
                等待扫描...
            </div>
            <button onclick="fetchIP()" class="neon-btn w-full py-2 rounded text-sm font-bold">启动侦测</button>
        </div>

        <!-- 工具 3：Base64 编码器 -->
        <div class="neon-box md:col-span-2 bg-gray-900 bg-opacity-80 p-6 rounded-lg">
            <h2 class="text-xl font-bold mb-4 text-cyan-400"># Base64 数据转化</h2>
            <p class="text-xs text-gray-500 mb-4">将明文转化为机器码，或将机器码解析为明文。</p>
            <textarea id="base64Input" rows="3" class="w-full bg-black border border-gray-700 rounded p-2 text-gray-200 mb-3 focus:outline-none focus:border-cyan-500" placeholder="在此输入需要处理的文本..."></textarea>
            <div class="flex gap-4">
                <button onclick="encodeBase64()" class="neon-btn flex-1 py-2 rounded text-sm font-bold">加密 (Encode)</button>
                <button onclick="decodeBase64()" class="border border-cyan-500 text-cyan-500 flex-1 py-2 rounded text-sm font-bold active:bg-cyan-900">解密 (Decode)</button>
            </div>
        </div>

    </main>

    <!-- 底部标识 -->
    <footer class="text-center mt-12 text-gray-600 text-xs">
        <p>SYSTEM ONLINE. ALL SYSTEMS NOMINAL. © CWJ-CORE</p>
    </footer>

    <!-- 核心功能脚本 -->
    <script>
        // 1. 生成密码
        function generatePassword() {
            const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+";
            let password = "";
            for (let i = 0; i < 16; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById("passwordOutput").value = password;
        }

        // 2. 复制到剪贴板
        function copyToClipboard(elementId) {
            const copyText = document.getElementById(elementId);
            if (!copyText.value) return alert("空数据，无法复制！");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("已成功复制到剪贴板！");
        }
