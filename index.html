<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CWJ TOOLS - 系统控制台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b0b0e; --card: #121217; --accent: #8b5cf6; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 2rem; }
        .logo { font-size: 1.5rem; font-weight: bold; margin-bottom: 2rem; color: var(--accent); }
        .module-section { margin-bottom: 3rem; }
        .section-title { font-size: 1.1rem; color: #8a8a93; margin-bottom: 1rem; border-left: 3px solid var(--accent); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .card { background: var(--card); padding: 1.5rem; border-radius: 12px; border: 1px solid #333; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); box-shadow: 0 5px 15px rgba(139,92,246,0.1); }
        
        /* 弹窗及爬虫显示区 */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 1000; padding: 2rem; box-sizing: border-box; }
        .box { background: var(--card); width: 100%; height: 100%; border-radius: 20px; border: 1px solid var(--accent); overflow-y: auto; padding: 20px; position: relative; }
        .close { position: absolute; top: 10px; right: 20px; font-size: 2rem; cursor: pointer; color: var(--accent); }
    </style>
</head>
<body>

    <div class="logo">CWJ TOOLS // SYSTEM</div>

    <div class="module-section">
        <div class="section-title">人工智能工具</div>
        <div class="grid">
            <div class="card" onclick="window.open('https://chatgpt.com', '_blank')"><i class="fa-solid fa-robot"></i> AI 聊天</div>
            <div class="card" onclick="openModal('数据抓取', '抓取中...')"><i class="fa-solid fa-spider"></i> 网页信息采集</div>
        </div>
    </div>

    <div class="module-section">
        <div class="section-title">实用工具</div>
        <div class="grid">
            <div class="card" onclick="openModal('天气', '正在获取实时天气...')"><i class="fa-solid fa-cloud"></i> 实时天气</div>
            <div class="card" onclick="openModal('密码生成', '生成中...')"><i class="fa-solid fa-key"></i> 密码生成器</div>
        </div>
    </div>

    <div id="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <div class="box" id="modalContent"></div>
    </div>

    <script>
        function openModal(title, content) {
            document.getElementById('modalContent').innerHTML = `<h2>${title}</h2><div id="inner">${content}</div>`;
            document.getElementById('modal').style.display = 'block';
            if(title === '网页信息采集') { runCrawler(); }
        }
        function closeModal() { document.getElementById('modal').style.display = 'none'; }
        
        async function runCrawler() {
            // 这是一个演示爬虫：直接在弹窗里显示结果
            document.getElementById('inner').innerText = "正在分析目标数据...";
            // 此处替换为你真正想爬的目标
            setTimeout(() => { document.getElementById('inner').innerText = "爬取成功：系统运行稳定，所有模块在线。"; }, 1500);
        }
    </script>
</body>
</html>
