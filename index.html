<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CWJ TOOLS</title>

<style>
:root{
  --bg:#0b0f14;
  --card:#111823;
  --line:#1e2a3a;
  --text:#e6e6e6;
  --muted:#8a94a6;
  --blue:#4da3ff;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}

body{
  background:var(--bg);
  color:var(--text);
}

/* 顶部 */
.top{
  padding:14px;
  font-weight:600;
  border-bottom:1px solid var(--line);
}

/* 页面 */
.page{
  display:none;
  padding:14px;
}
.page.active{display:block;}

/* 卡片 */
.card{
  background:var(--card);
  border:1px solid var(--line);
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

/* 网格 */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.tool{
  padding:12px;
  border:1px solid var(--line);
  border-radius:10px;
  background:transparent;
  cursor:pointer;
}

/* 输入 */
input,textarea{
  width:100%;
  padding:10px;
  margin-top:8px;
  background:#0e141d;
  border:1px solid var(--line);
  border-radius:8px;
  color:var(--text);
}

/* 按钮 */
button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:var(--blue);
  color:#fff;
}

/* 底部 */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  display:flex;
  border-top:1px solid var(--line);
  background:var(--bg);
}

.bottom div{
  flex:1;
  text-align:center;
  padding:10px;
  font-size:12px;
  color:var(--muted);
  cursor:pointer;
}

.bottom .active{
  color:var(--blue);
}
</style>
</head>

<body>

<div class="top">CWJ TOOLS</div>

<!-- HOME -->
<div class="page active" id="home">
  <div class="card">📊 系统状态：正常</div>
  <div class="card">⚡ 工具数量：4 + 扩展</div>

  <div class="grid">
    <div class="tool" onclick="go('pwd')">密码生成</div>
    <div class="tool" onclick="go('weather')">天气</div>
    <div class="tool" onclick="go('hash')">哈希</div>
    <div class="tool" onclick="go('aes')">加密</div>
  </div>
</div>

<!-- PASSWORD -->
<div class="page" id="pwd">
  <div class="card">密码生成器</div>
  <input id="pwlen" type="number" value="12">
  <button onclick="genPwd()">生成</button>
  <div class="card" id="pwout"></div>
</div>

<!-- WEATHER -->
<div class="page" id="weather">
  <div class="card">天气</div>
  <input id="city">
  <button onclick="getWeather()">查询</button>
  <div class="card" id="wout"></div>
</div>

<!-- HASH -->
<div class="page" id="hash">
  <div class="card">SHA-256</div>
  <textarea id="hinput"></textarea>
  <button onclick="hash()">计算</button>
  <div class="card" id="hout"></div>
</div>

<!-- AES -->
<div class="page" id="aes">
  <div class="card">Base64 加密</div>
  <textarea id="ainput"></textarea>
  <button onclick="aesFake()">转换</button>
  <div class="card" id="aout"></div>
</div>

<!-- bottom -->
<div class="bottom">
  <div class="active" onclick="go('home',event)">首页</div>
  <div onclick="go('pwd',event)">密码</div>
  <div onclick="go('weather',event)">天气</div>
  <div onclick="go('hash',event)">哈希</div>
  <div onclick="go('aes',event)">加密</div>
</div>

<script>

function go(id,e){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');

  if(e){
    document.querySelectorAll('.bottom div').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
  }
}

/* 密码 */
function genPwd(){
  let len=document.getElementById('pwlen').value;
  let chars='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let out='';
  for(let i=0;i<len;i++){
    out+=chars[Math.floor(Math.random()*chars.length)];
  }
  document.getElementById('pwout').innerText=out;
}

/* 天气 */
async function getWeather(){
  let city=document.getElementById('city').value;
  let res=await fetch('https://wttr.in/'+city+'?format=3');
  document.getElementById('wout').innerText=await res.text();
}

/* hash */
async function hash(){
  let txt=document.getElementById('hinput').value;
  let buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(txt));
  let hex=[...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,'0')).join('');
  document.getElementById('hout').innerText=hex;
}

/* base64 */
function aesFake(){
  let txt=document.getElementById('ainput').value;
  document.getElementById('aout').innerText=btoa(txt);
}

</script>

</body>
</html>
