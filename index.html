<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CWJ TOOLS</title>

<style>
body{margin:0;font-family:system-ui;background:#000;color:#fff;}
.top{padding:14px;border-bottom:1px solid #222;display:flex;justify-content:space-between;}
.pages{padding:12px;}
.card{background:#111;border:1px solid #222;padding:12px;border-radius:12px;margin-bottom:10px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn{padding:12px;background:#2997ff;border:none;border-radius:10px;color:#fff;margin-top:8px;width:100%;}
input,textarea{width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid #222;background:#111;color:#fff;}
.page{display:none;}
.page.active{display:block;}
.bottom{position:fixed;bottom:0;left:0;right:0;display:flex;background:#000;border-top:1px solid #222;}
.bottom div{flex:1;text-align:center;padding:10px;font-size:12px;color:#888;}
.bottom .active{color:#2997ff;}
</style>
</head>

<body>

<div class="top">
  <div>CWJ TOOLS</div>
  <div style="color:#30d158;">ONLINE</div>
</div>

<div class="pages">

<!-- HOME -->
<div id="home" class="page active">
  <div class="card">工具中心（基础版恢复成功）</div>

  <div class="grid">
    <div class="card" onclick="go('pwd')">🔑 密码生成</div>
    <div class="card" onclick="go('weather')">🌤 天气</div>
    <div class="card" onclick="go('hash')"># 哈希</div>
    <div class="card" onclick="go('crypto')">🔐 加密</div>
  </div>
</div>

<!-- PWD -->
<div id="pwd" class="page">
  <div class="card">密码生成</div>
  <input id="pwdLen" type="number" value="12">
  <button class="btn" onclick="genPwd()">生成</button>
  <div class="card" id="pwdOut"></div>
</div>

<!-- WEATHER -->
<div id="weather" class="page">
  <div class="card">天气查询</div>
  <input id="city">
  <button class="btn" onclick="weather()">查询</button>
  <div class="card" id="wout"></div>
</div>

<!-- HASH -->
<div id="hash" class="page">
  <div class="card">SHA-256</div>
  <textarea id="hinput"></textarea>
  <button class="btn" onclick="hash()">计算</button>
  <div class="card" id="hout"></div>
</div>

<!-- CRYPTO -->
<div id="crypto" class="page">
  <div class="card">Base64加密</div>
  <textarea id="cinput"></textarea>
  <button class="btn" onclick="cryptoTool()">转换</button>
  <div class="card" id="cout"></div>
</div>

</div>

<div class="bottom">
  <div onclick="go('home')" class="active">首页</div>
  <div onclick="go('pwd')">密码</div>
  <div onclick="go('weather')">天气</div>
  <div onclick="go('hash')">哈希</div>
  <div onclick="go('crypto')">加密</div>
</div>

<script>

function go(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function genPwd(){
  const len = document.getElementById('pwdLen').value;
  const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  let out = "";
  const arr = crypto.getRandomValues(new Uint32Array(len));
  for(let i=0;i<len;i++){
    out += chars[arr[i]%chars.length];
  }
  document.getElementById('pwdOut').innerText = out;
}

async function weather(){
  const city = document.getElementById('city').value;
  const res = await fetch(`https://wttr.in/${city}?format=3`);
  const text = await res.text();
  document.getElementById('wout').innerText = text;
}

async function hash(){
  const text = document.getElementById('hinput').value;
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  const hex = [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
  document.getElementById('hout').innerText = hex;
}

function cryptoTool(){
  const text = document.getElementById('cinput').value;
  document.getElementById('cout').innerText = btoa(text);
}

</script>

</body>
</html>
