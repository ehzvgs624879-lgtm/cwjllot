<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>CWJ TOOLS - 交互中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: #0b0b0e; --card: #121217; --accent: #8b5cf6; --text: #ffffff; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        h1 { margin-left: 10px; }
        .module-section { margin: 30px 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid #333; cursor: pointer; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .icon-box { width: 40px; height: 40px; background: rgba(139,92,246,0.1); color: var(--accent); display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        
        /* 弹窗样式 */
        #modal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); z-index: 1000; justify-content: center; align-items: center; }
        .box { background: var(--card); width: 95%; height: 90%; border-radius: 20px; position: relative; border: 1px solid var(--accent); overflow: hidden; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: var(--accent); z-index: 1001; }
        iframe { width: 100%; height: 100%; border: none; background: #fff; }
    </style>
</head>
<body>

    <h1>CWJ TOOLS</h1>
    
    <div class="module-section">
        <h2>人工智能工具</h2>
        <div class="grid">
            <div class="card" onclick="openTool('https://chatgpt.com')"><div class="icon-box"><i class="fa-solid fa-robot"></i></div>AI 聊天</div>
            <div class="card" onclick="openTool('https://translate.google.com')"><div class="icon-box"><i class="fa-solid fa-language"></i></div>人工智能翻译</div>
        </div>
    </div>

    <div class="module-section">
        <h2>实用工具</h2>
        <div class="grid">
            <div class="card" onclick="openTool('https://www.google.com/search?q=天气')"><div class="icon-box"><i class="fa-solid fa-cloud"></i></div>天气</div>
            <div class="card" onclick="openTool('https://passwordsgenerator.net/')"><div class="icon-box"><i class="fa-solid fa-key"></i></div>密码生成器</div>
        </div>
    </div>

    <div class="module-section">
        <h2>开发与文件</h2>
        <div class="grid">
            <div class="card" onclick="openTool('https://jsonformatter.curiousconcept.com/')"><div class="icon-box"><i class="fa-solid fa-code"></i></div>JSON 格式化</div>
            <div class="card" onclick="openTool('https://www.base64decode.org/')"><div class="icon-box"><i class="fa-solid fa-hashtag"></i></div>Base64</div>
        </div>
    </div>

    <div id="modal">
        <span class="close" onclick="closeTool()">&times;</span>
        <div class="box"><iframe id="toolFrame" src=""></iframe></div>
    </div>

    <script>
        function openTool(url) {
            document.getElementById('toolFrame').src = url;
            document.getElementById('modal').style.display = 'flex';
        }
        function closeTool() { 
            document.getElementById('modal').style.display = 'none'; 
            document.getElementById('toolFrame').src = ""; 
        }
    </script>
</body>
</html>
