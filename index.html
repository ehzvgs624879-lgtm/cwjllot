<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CWJ Tools - 系统模块</title>
    <!-- 引入 FontAwesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 全局变量定义赛博朋克配色 */
        :root {
            --bg-color: #0b0b0e;
            --card-bg: #121217;
            --text-main: #ffffff;
            --text-sub: #8a8a93;
            --accent-purple: #8b5cf6;
            --accent-glow: #a855f7;
            --badge-live-text: #2dd4bf;
            --badge-live-bg: rgba(45, 212, 191, 0.1);
            --badge-soon-text: #a855f7;
            --badge-soon-bg: rgba(168, 85, 247, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }

        /* 点阵背景特效 */
        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航栏 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem;
            background: rgba(11, 11, 14, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .logo { display: flex; align-items: center; gap: 10px; font-weight: bold; font-size: 1.2rem; letter-spacing: 1px;}
        .logo i { color: var(--accent-purple); font-size: 1.4rem; }
        .menu-btn { color: var(--text-main); font-size: 1.5rem; cursor: pointer; }

        /* 主体内容区 */
        main { padding: 2rem 1.5rem; flex: 1; max-width: 800px; margin: 0 auto; width: 100%; }

        /* 标题部分 */
        .page-title { font-size: 2rem; font-weight: bold; margin-bottom: 1rem; }
        .page-desc { color: var(--text-sub); font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.5rem; }
        .title-divider { width: 80px; height: 3px; background: linear-gradient(90deg, #06b6d4, var(--accent-purple)); margin-bottom: 3rem; border-radius: 2px;}

        /* 分类模块 */
        .module-section { margin-bottom: 3rem; }
        .section-header { margin-bottom: 1.5rem; }
        .section-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 0.3rem; }
        .section-subtitle { color: var(--text-sub); font-size: 0.85rem; }

        /* 工具卡片 */
        .card-grid { display: flex; flex-direction: column; gap: 1rem; }
        .tool-card {
            background-color: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 12px;
            padding: 1.2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        .tool-card:hover { border-color: rgba(139, 92, 246, 0.3); box-shadow: 0 0 15px rgba(139, 92, 246, 0.1); transform: translateY(-2px); }
        .card-left { display: flex; align-items: center; gap: 1rem; font-weight: 500; }
        .card-icon {
            width: 40px; height: 40px; border-radius: 8px; background: rgba(139, 92, 246, 0.1); display: flex; justify-content: center; align-items: center; color: var(--accent-purple); font-size: 1.1rem;
        }

        /* 状态标签 */
        .badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 20px; font-weight: 600; }
        .badge.soon { background-color: var(--badge-soon-bg); color: var(--badge-soon-text); }
        .badge.live { background-color: var(--badge-live-bg); color: var(--badge-live-text); }

        /* 页脚 */
        footer { text-align: center; padding: 3rem 1.5rem; color: var(--text-sub); border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .footer-logo { display: flex; justify-content: center; align-items: center; gap: 8px; font-weight: bold; margin-bottom: 1rem; color: var(--text-main);}
        .footer-logo i { color: var(--accent-purple); }
        .footer-status { font-size: 0.8rem; letter-spacing: 1px; font-family: monospace; }
    </style>
</head>
<body>

    <header>
        <div class="logo"><i class="fa-solid fa-microchip"></i> CWJ <span style="color: var(--accent-purple);">.</span></div>
        <i class="fa-solid fa-bars menu-btn"></i>
    </header>

    <main>
        <h1 class="page-title">系统模块</h1>
        <p class="page-desc">浏览 CWJ 平台中所有可用工具和实用程序的完整目录。</p>
        <div class="title-divider"></div>

        <!-- 1. 人工智能工具 -->
        <div class="module-section">
            <div class="section-header">
